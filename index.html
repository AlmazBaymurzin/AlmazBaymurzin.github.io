    <style>

        .current-date-box {

        .card-of-day {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8d4 100%);

        .card-of-day-title {
            display: flex;

        .card-of-day-title span {

        }

        .card-of-day-content {
            font-size: 1.2rem;

            font-family: 'Georgia', serif;
            color: #4a2c1a;

        }

        .card-of-day-trans {
            font-size: 0.85rem;
            color: #8f7a64;
        }

        .motivation-block {
            background: linear-gradient(135deg, #e8dcc8 0%, #dacaa8 100%);

        }

        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));

            margin: 20px 0;
        }

        .section-card, .subcat-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .section-card:hover, .subcat-card:hover {
            transform: translateY(-4px);
            background: #fffbf5;
        }

        .section-emoji, .subcat-emoji {
            font-size: 2.8rem;

            margin-bottom: 10px;
        }

        .section-name, .subcat-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #5c3e1e;
        }

        .section-desc, .subcat-desc {
            font-size: 0.75rem;
            color: #b8956a;
            margin-top: 6px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 20px 0;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            transition: transform 0.2s;
            border: 1px solid rgba(139,90,43,0.15);
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card-badge {
            display: inline-block;

            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;

            margin-bottom: 16px;

        .card-text {
            font-size: 1.3rem;

        }

        .card-translation {
            font-size: 0.85rem;
            color: #8f7a64;
            border-top: 1px solid #f0e2d2;
            padding-top: 16px;
        }

        .holidays-widget {
            background: white;
            border-radius: 32px;

        .widget-title {

        .holiday-item {
            padding: 10px 0;

            font-size: 0.7rem;

        .holiday-name small {

        .footer {
            text-align: center;
            margin-top: 50px;

        }

        .project-name {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #8b5a2b;
            font-family: 'Georgia', serif;
        }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .card-of-day-content { font-size: 1rem; }
            h1 { font-size: 1.8rem; }

<body>
<div class="container">
    <header>
        <h1>🌾 ЙЫЛЫ һҮҘҘӘР 🌾</h1>
        <div class="sub">Башҡортса ҡотлауҙар — һәр көн өсөн йылы теләктәр</div>
        <div class="current-date-box" id="currentDateBox"></div>
    </header>

    <div id="navigation">
        <button class="back-button" id="backBtn" style="display: none;">← Артҡа / Назад</button>
    </div>

    <div class="main-layout">
        <div class="content-area">
            <div id="cardOfDayContainer"></div>
            <div id="motivationBlock" style="display: none;"></div>
            <div id="contentContainer"></div>
        </div>

        <div class="sidebar">
            <div class="holidays-widget">
                <div class="widget-title">📅 Яҡын киләсәк байрамдар</div>
                <div id="holidaysContent"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="project-name">ЙЫЛЫ һҮҘҘӘР<br><small>yily huzzar</small></div>
        <div style="font-size:0.8rem; margin-top:12px;">❤️ Йөрәк йылыһы — туған телдә әйтелгән һүҙҙә</div>
    </div>
</div>

<script>
    // ========== БАЗА ДАННЫХ С ПОЗДРАВЛЕНИЯМИ ==========
    const allGreetings = [];

    const data = {
        "professional": {
            name: "Һөнәри байрамдар", nameRu: "Профессиональные праздники", emoji: "💼",
            subcategories: {
                "border_day": { name: "Сиксе көнө", nameRu: "День пограничника", emoji: "🛡️",
                    greetings: [
                        { text: "Сик һаҡсылары көнө менән! Тыуған ил сиктәре ныҡлы булһын!", translation: "С Днём пограничника! Пусть границы Родины будут крепкими!" },
                        { text: "Һәр көнөң тыныс, хеҙмәтең еңел булһын, сиксе!", translation: "Пусть каждый твой день будет мирным, а служба лёгкой!" }
                    ] },
                "military_day": { name: "Хәрби көнө", nameRu: "День военного", emoji: "⭐",
                    greetings: [
                        { text: "Ватанды һаҡлаусы! Көсөң, батырлығың артһын!", translation: "Защитник Отечества! Пусть твои сила и храбрость растут!" }
                    ] },
                "doctor_day": { name: "Табип көнө", nameRu: "День врача", emoji: "🩺",
                    greetings: [
                        { text: "Табиптар көнө менән! Һеҙҙең ҡулдар меңләгән кешене ҡотҡара!", translation: "С Днём врача! Ваши руки спасают тысячи людей!" }
                    ] }
            } },
        "holidays": {
            name: "Байрамдар", nameRu: "Праздники", emoji: "🎉",
            subcategories: {
                "march8": { name: "8 Март", nameRu: "8 Марта", emoji: "🌷",
                    greetings: [
                        { text: "8 Март менән! Һәр ҡатын-ҡыҙ ҡояш нурҙары кеүек яҡты булһын!", translation: "С 8 Марта! Пусть каждая женщина будет светлой!" }
                    ] },
                "feb23": { name: "23 Февраль", nameRu: "23 Февраля", emoji: "🎖️",
                    greetings: [
                        { text: "23 февраль менән! Ир-егеттәр, һеҙ көслө һәм батыр булығыҙ!", translation: "С 23 февраля! Мужчины, будьте сильными и храбрыми!" }
                    ] }
            } },
        "birthday": {
            name: "Тыуған көн", nameRu: "День рождения", emoji: "🎂",
            subcategories: {
                "mother": { name: "Әсәйемә", nameRu: "Маме", emoji: "👩‍👧",
                    greetings: [
                        { text: "Әсәйем, тыуған көнөң менән! Һин донъяла иң яҡшы!", translation: "Мамочка, с днём рождения! Ты — лучшая на свете!" }
                    ] },
                "father": { name: "Атайыма", nameRu: "Папе", emoji: "👨‍👧‍👦",
                    greetings: [
                        { text: "Атайым, тыуған көнөң менән! Һин беҙҙең терәк!", translation: "Папа, с днём рождения! Ты наша опора!" }
                    ] }
            } }
    };

    // Собираем все поздравления в один массив (для карточки дня)
    for (let sectionKey in data) {
        for (let subKey in data[sectionKey].subcategories) {
            const sub = data[sectionKey].subcategories[subKey];
            sub.greetings.forEach(g => {
                allGreetings.push({
                    text: g.text,
                    translation: g.translation,
                    category: sub.name,
                    categoryRu: sub.nameRu,
                    section: data[sectionKey].name,
                    emoji: sub.emoji
                });
            });
        }
    }

    // ========== КАРТОЧКА ДНЯ ==========
    function getTodaysGreeting() {
        const today = new Date().toDateString();
        let stored = localStorage.getItem('cardOfDay');
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.date === today) return parsed.greeting;
        }
        const randomIndex = Math.floor(Math.random() * allGreetings.length);
        const greeting = allGreetings[randomIndex];
        localStorage.setItem('cardOfDay', JSON.stringify({ date: today, greeting: greeting }));
        return greeting;
    }

    function renderCardOfDay() {
        const card = getTodaysGreeting();
        const container = document.getElementById('cardOfDayContainer');
        if (!container) return;
        container.innerHTML = `
            <div class="card-of-day">
                <div class="card-of-day-title"><span>⭐</span> Бөгөнгө йылы һүҙ / Тёплое слово дня</div>
                <div class="card-of-day-content">${escapeHtml(card.text)}</div>
                <div class="card-of-day-trans">💭 ${escapeHtml(card.translation)}</div>
                <div style="font-size:0.7rem; margin-top:10px; color:#b8956a;">🏷️ ${card.category} | ${card.section}</div>
            </div>
        `;
    }

    // ========== ПРАЗДНИКИ (ПРОСТОЙ СПИСОК) ==========
    const allHolidays = [
        { date: "01-01", name: "Яңы йыл", nameRu: "Новый год" },
        { date: "01-07", name: "Раштыуа", nameRu: "Рождество" },
        { date: "02-23", name: "Ватанды һаҡлаусылар көнө", nameRu: "День защитника Отечества" },
        { date: "03-08", name: "Халыҡ-ара ҡатын-ҡыҙҙар көнө", nameRu: "8 Марта" },
        { date: "05-01", name: "Яҙ һәм хеҙмәт көнө", nameRu: "Праздник Весны и Труда" },
        { date: "05-09", name: "Еңеү көнө", nameRu: "День Победы" },
        { date: "06-12", name: "Рәсәй көнө", nameRu: "День России" },
        { date: "07-01", name: "Ураҙа байрам (сама менән)", nameRu: "Ураза-байрам" },
        { date: "07-08", name: "Ғаилә, мөхәббәт һәм тоғролоҡ көнө", nameRu: "День семьи, любви и верности" },
        { date: "08-02", name: "Ильин көнө", nameRu: "Ильин день" },
        { date: "09-01", name: "Белем көнө", nameRu: "День знаний" },
        { date: "10-05", name: "Уҡытыусылар көнө", nameRu: "День учителя" },
        { date: "11-04", name: "Халыҡ берҙәмлеге көнө", nameRu: "День народного единства" },
        { date: "12-12", name: "Конституция көнө", nameRu: "День Конституции" }
    ];

    function getUpcomingHolidays(limit = 10) {
        const today = new Date();
        const currentYear = today.getFullYear();
        const todayTimestamp = today.getTime();
        
        const holidaysWithDates = allHolidays.map(h => {
            const [month, day] = h.date.split('-');
            let holidayDate = new Date(currentYear, parseInt(month)-1, parseInt(day));
            if (holidayDate < today) {
                holidayDate = new Date(currentYear + 1, parseInt(month)-1, parseInt(day));
            }
            return {
                ...h,
                displayDate: `${day}.${month}`,
                timestamp: holidayDate.getTime()
            };
        });
        
        holidaysWithDates.sort((a, b) => a.timestamp - b.timestamp);
        return holidaysWithDates.slice(0, limit);
    }

    function renderHolidaysWidget() {
        const container = document.getElementById('holidaysContent');
        if (!container) return;
        
        const upcomingHolidays = getUpcomingHolidays(10);
        let html = '';
        
        upcomingHolidays.forEach(h => {
            html += `
                <div class="holiday-item">
                    <span class="holiday-date">${h.displayDate}</span>
                    <span class="holiday-name">${h.name}<br><small>${h.nameRu}</small></span>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // ========== НАВИГАЦИЯ ==========
    let currentSection = null;
    let currentSubcat = null;
    const contentContainer = document.getElementById('contentContainer');
    const backBtn = document.getElementById('backBtn');
    const motivationBlock = document.getElementById('motivationBlock');

    function showMotivationBlock(show) {
        if (show) {
            motivationBlock.style.display = 'block';
            motivationBlock.innerHTML = `
                <div class="motivation-block">
                    <div class="motivation-quote">«Туған телдә әйтелгән йылы һүҙ — йөрәккә шифа»</div>
                    <div class="motivation-author">— Башҡорт халыҡ мәҡәле</div>
                    <div style="margin-top:16px;">🌾 Кешенең туған телендә ҡотлау — уның йөрәгенә иң ҡыҫҡа юл.</div>
                </div>
            `;
        } else {
            motivationBlock.style.display = 'none';
        }
    }

    function updateNavigation() {
        if (currentSection === null) {
            backBtn.style.display = 'none';
            showMotivationBlock(true);
            renderCardOfDay();
        } else {
            backBtn.style.display = 'inline-block';
            showMotivationBlock(false);
        }
    }

    function renderGreetings() {
        if (!currentSection || !currentSubcat) return;
        const subcat = data[currentSection].subcategories[currentSubcat];
        const greetingsList = subcat.greetings;
        let html = `<div class="cards-grid">`;
        greetingsList.forEach(g => {
            html += `
                <div class="card">
                    <div class="card-badge">${subcat.name} | ${subcat.nameRu}</div>
                    <div class="card-text">${escapeHtml(g.text)}</div>
                    <div class="card-translation">💭 ${escapeHtml(g.translation)}</div>
                </div>
            `;
        });
        html += `</div>`;
        contentContainer.innerHTML = html;
    }

    function renderSubcategories() {
        if (!currentSection) return;
        const section = data[currentSection];
        let html = `<div class="sections-grid">`;
        for (let [key, subcat] of Object.entries(section.subcategories)) {
            html += `<div class="subcat-card" data-subcat="${key}">
                        <span class="subcat-emoji">${subcat.emoji}</span>
                        <div class="subcat-name">${subcat.name}</div>
                        <div class="subcat-desc">${subcat.nameRu}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        document.querySelectorAll('.subcat-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSubcat = card.getAttribute('data-subcat');
                updateNavigation();
                renderGreetings();
            });
        });
    }

    function renderSections() {
        let html = `<div class="sections-grid">`;
        for (let [key, section] of Object.entries(data)) {
            html += `<div class="section-card" data-section="${key}">
                        <span class="section-emoji">${section.emoji}</span>
                        <div class="section-name">${section.name}</div>
                        <div class="section-desc">${section.nameRu}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        document.querySelectorAll('.section-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSection = card.getAttribute('data-section');
                currentSubcat = null;
                updateNavigation();
                renderSubcategories();
            });
        });
    }

    backBtn.addEventListener('click', () => {
        if (currentSubcat !== null) {
            currentSubcat = null;
            updateNavigation();
            renderSubcategories();
        } else if (currentSection !== null) {
            currentSection = null;
            updateNavigation();
            renderSections();
        }
    });

    function renderCurrentDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const ruDate = now.toLocaleDateString('ru-RU', options);
        const baMap = { 'понедельник':'Дүшәмбе', 'вторник':'Шишәмбе', 'среда':'Шаршамбы',
            'четверг':'Кесаҙна', 'пятница':'Йома', 'суббота':'Шәмбе', 'воскресенье':'Йәкшәмбе' };
        let baDate = ruDate;
        for (let [ru, ba] of Object.entries(baMap)) baDate = baDate.replace(ru, ba);
        document.getElementById('currentDateBox').innerHTML = `📅 ${baDate}`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // СТАРТ
    renderCurrentDate();
    renderHolidaysWidget();
    renderSections();
    updateNavigation();
</script>
</body>
</html>

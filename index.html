<!DOCTYPE html>
<html lang="ba">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Йылы һүҙҙәр — Поздравления на башкирском языке</title>
    <style>
        /* ВСЕ СТИЛИ ОСТАЮТСЯ ТАКИМИ ЖЕ, КАК В ПРЕДЫДУЩЕЙ ВЕРСИИ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef9e8 0%, #f0e6d8 100%);
            color: #2c241a;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .main-layout { display: flex; gap: 30px; margin-top: 20px; }
        .content-area { flex: 3; min-width: 0; }
        .sidebar { flex: 1.2; min-width: 260px; }
        header { text-align: center; padding: 1.5rem 0 0.5rem 0; }
        h1 { font-size: 2.5rem; color: #8b5a2b; }
        .sub { font-size: 1rem; color: #a07649; margin-top: 6px; }
        .current-date-box {
            background: rgba(139,90,43,0.08);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #6b4925;
        }
        .loading { text-align: center; padding: 60px; color: #b8956a; }
        .card-of-day {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8d4 100%);
            border-radius: 32px;
            padding: 20px 28px;
            margin: 20px 0;
            border: 2px solid #e8c9a8;
        }
        .card-of-day-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b5a2b;
            margin-bottom: 16px;
        }
        .card-of-day-content { font-size: 1.2rem; line-height: 1.45; font-family: 'Georgia', serif; margin-bottom: 12px; }
        .card-of-day-trans { font-size: 0.85rem; color: #8f7a64; }
        .motivation-block {
            background: linear-gradient(135deg, #e8dcc8 0%, #dacaa8 100%);
            border-radius: 32px;
            padding: 28px 32px;
            margin: 25px 0 20px 0;
            text-align: center;
        }
        .motivation-quote { font-size: 1.3rem; font-style: italic; font-family: 'Georgia', serif; }
        .back-button {
            display: inline-block;
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 15px 0;
            cursor: pointer;
            font-size: 0.9rem;
            color: #8b5a2b;
        }
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .section-card, .subcat-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .section-card:hover, .subcat-card:hover { transform: translateY(-4px); background: #fffbf5; }
        .section-emoji, .subcat-emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
        .section-name, .subcat-name { font-size: 1.2rem; font-weight: 600; color: #5c3e1e; }
        .section-desc, .subcat-desc { font-size: 0.75rem; color: #b8956a; margin-top: 6px; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 20px 0;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            transition: transform 0.2s;
            border: 1px solid rgba(139,90,43,0.15);
        }
        .card:hover { transform: translateY(-4px); }
        .card-badge {
            display: inline-block;
            background: #f4ebdd;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #8b5a2b;
            margin-bottom: 16px;
        }
        .card-text { font-size: 1.3rem; line-height: 1.45; font-family: 'Georgia', serif; margin-bottom: 20px; }
        .card-translation { font-size: 0.85rem; color: #8f7a64; border-top: 1px solid #f0e2d2; padding-top: 16px; }
        .holidays-widget {
            background: white;
            border-radius: 32px;
            padding: 24px;
            position: sticky;
            top: 20px;
        }
        .widget-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #8b5a2b;
            border-bottom: 2px solid #f0e2d2;
            padding-bottom: 12px;
            margin-bottom: 18px;
        }
        .holiday-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0e2d2;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .holiday-date {
            font-size: 0.7rem;
            background: #f4ebdd;
            padding: 3px 10px;
            border-radius: 20px;
            min-width: 60px;
            text-align: center;
        }
        .holiday-name { font-size: 0.85rem; color: #3a2a1a; }
        .holiday-name small { font-size: 0.7rem; color: #b8956a; }
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 35px 25px;
            background: rgba(139,90,43,0.05);
            border-radius: 48px;
        }
        .project-name {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #8b5a2b;
            font-family: 'Georgia', serif;
        }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .card-of-day-content { font-size: 1rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🌾 ЙЫЛЫ һҮҘҘӘР 🌾</h1>
        <div class="sub">Башҡортса ҡотлауҙар — һәр көн өсөн йылы теләктәр</div>
        <div class="current-date-box" id="currentDateBox"></div>
    </header>

    <div id="navigation">
        <button class="back-button" id="backBtn" style="display: none;">← Артҡа / Назад</button>
    </div>

    <div class="main-layout">
        <div class="content-area">
            <div id="cardOfDayContainer"></div>
            <div id="motivationBlock" style="display: none;"></div>
            <div id="contentContainer"><div class="loading">📡 Мәғлүмәт тейәлә...<br>Загрузка...</div></div>
        </div>
        <div class="sidebar">
            <div class="holidays-widget">
                <div class="widget-title">📅 Яҡын киләсәк байрамдар</div>
                <div id="holidaysContent"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="project-name">ЙЫЛЫ һҮҘҘӘР<br><small>yily huzzar</small></div>
        <div style="font-size:0.8rem; margin-top:12px;">❤️ Йөрәк йылыһы — туған телдә әйтелгән һүҙҙә</div>
        <div id="lastUpdated" style="font-size:0.7rem; margin-top:10px; color:#b8956a;"></div>
    </div>
</div>

<script>
    // ========== ЗАГРУЗКА ДАННЫХ ИЗ JSON ==========
    let siteData = null;
    let currentSection = null;
    let currentSubcat = null;
    
    const contentContainer = document.getElementById('contentContainer');
    const backBtn = document.getElementById('backBtn');
    const motivationBlock = document.getElementById('motivationBlock');
    const cardOfDayContainer = document.getElementById('cardOfDayContainer');
    const holidaysContent = document.getElementById('holidaysContent');
    
    async function loadData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            if (!response.ok) throw new Error('Не удалось загрузить data.json');
            const data = await response.json();
            siteData = data;
            document.getElementById('lastUpdated').innerHTML = `🔄 Обновлено: ${new Date().toLocaleString('ru-RU')}`;
            return true;
        } catch (error) {
            contentContainer.innerHTML = `<div class="loading" style="color:#c96a2a;">❌ Ошибка: ${error.message}<br>Убедитесь, что файл data.json существует в той же папке</div>`;
            return false;
        }
    }
    
    // ========== ВСЕ ОСТАЛЬНЫЕ ФУНКЦИИ (ОНИ РАБОТАЮТ С siteData) ==========
    
    function getAllGreetings() {
        if (!siteData) return [];
        const all = [];
        for (let secKey in siteData.sections) {
            const section = siteData.sections[secKey];
            for (let subKey in section.subcategories) {
                const subcat = section.subcategories[subKey];
                subcat.greetings.forEach(g => {
                    all.push({
                        text_ba: g.text_ba,
                        translation_ru: g.translation_ru,
                        category: subcat.name_ba,
                        categoryRu: subcat.name_ru,
                        section: section.name_ba,
                        emoji: subcat.emoji
                    });
                });
            }
        }
        return all;
    }
    
    function getTodaysGreeting() {
        const all = getAllGreetings();
        if (!all.length) return null;
        const today = new Date().toDateString();
        let stored = localStorage.getItem('cardOfDay');
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.date === today) return parsed.greeting;
        }
        const randomIndex = Math.floor(Math.random() * all.length);
        const greeting = all[randomIndex];
        localStorage.setItem('cardOfDay', JSON.stringify({ date: today, greeting: greeting }));
        return greeting;
    }
    
    function renderCardOfDay() {
        const card = getTodaysGreeting();
        if (!card) return;
        cardOfDayContainer.innerHTML = `
            <div class="card-of-day">
                <div class="card-of-day-title"><span>⭐</span> Бөгөнгө йылы һүҙ / Тёплое слово дня</div>
                <div class="card-of-day-content">${escapeHtml(card.text_ba)}</div>
                <div class="card-of-day-trans">💭 ${escapeHtml(card.translation_ru)}</div>
                <div style="font-size:0.7rem; margin-top:10px; color:#b8956a;">🏷️ ${card.category} | ${card.section}</div>
            </div>
        `;
    }
    
    function getUpcomingHolidays(limit = 10) {
        if (!siteData || !siteData.holidays_widget) return [];
        const today = new Date();
        const currentYear = today.getFullYear();
        
        const withDates = siteData.holidays_widget.map(h => {
            const [month, day] = h.date.split('-');
            let holidayDate = new Date(currentYear, parseInt(month)-1, parseInt(day));
            if (holidayDate < today) {
                holidayDate = new Date(currentYear + 1, parseInt(month)-1, parseInt(day));
            }
            return {
                ...h,
                displayDate: `${day}.${month}`,
                timestamp: holidayDate.getTime()
            };
        });
        withDates.sort((a, b) => a.timestamp - b.timestamp);
        return withDates.slice(0, limit);
    }
    
    function renderHolidaysWidget() {
        if (!siteData) return;
        const holidays = getUpcomingHolidays(10);
        let html = '';
        holidays.forEach(h => {
            html += `
                <div class="holiday-item">
                    <span class="holiday-date">${h.displayDate}</span>
                    <span class="holiday-name">${escapeHtml(h.name_ba)}<br><small>${escapeHtml(h.name_ru)}</small></span>
                </div>
            `;
        });
        holidaysContent.innerHTML = html;
    }
    
    function showMotivationBlock(show) {
        if (show) {
            motivationBlock.style.display = 'block';
            motivationBlock.innerHTML = `
                <div class="motivation-block">
                    <div class="motivation-quote">«Туған телдә әйтелгән йылы һүҙ — йөрәккә шифа»</div>
                    <div class="motivation-author">— Башҡорт халыҡ мәҡәле</div>
                    <div style="margin-top:16px;">🌾 Кешенең туған телендә ҡотлау — уның йөрәгенә иң ҡыҫҡа юл.</div>
                </div>
            `;
        } else {
            motivationBlock.style.display = 'none';
        }
    }
    
    function updateNavigation() {
        if (currentSection === null) {
            backBtn.style.display = 'none';
            showMotivationBlock(true);
            renderCardOfDay();
        } else {
            backBtn.style.display = 'inline-block';
            showMotivationBlock(false);
            cardOfDayContainer.innerHTML = '';
        }
    }
    
    function renderGreetings() {
        if (!currentSection || !currentSubcat || !siteData) return;
        const subcat = siteData.sections[currentSection].subcategories[currentSubcat];
        let html = `<div class="cards-grid">`;
        subcat.greetings.forEach(g => {
            html += `
                <div class="card">
                    <div class="card-badge">${escapeHtml(subcat.name_ba)} | ${escapeHtml(subcat.name_ru)}</div>
                    <div class="card-text">${escapeHtml(g.text_ba)}</div>
                    <div class="card-translation">💭 ${escapeHtml(g.translation_ru)}</div>
                </div>
            `;
        });
        html += `</div>`;
        contentContainer.innerHTML = html;
    }
    
    function renderSubcategories() {
        if (!currentSection || !siteData) return;
        const section = siteData.sections[currentSection];
        let html = `<div class="sections-grid">`;
        for (let [key, subcat] of Object.entries(section.subcategories)) {
            html += `<div class="subcat-card" data-subcat="${key}">
                        <span class="subcat-emoji">${subcat.emoji}</span>
                        <div class="subcat-name">${escapeHtml(subcat.name_ba)}</div>
                        <div class="subcat-desc">${escapeHtml(subcat.name_ru)}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        
        document.querySelectorAll('.subcat-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSubcat = card.getAttribute('data-subcat');
                updateNavigation();
                renderGreetings();
            });
        });
    }
    
    function renderSections() {
        if (!siteData) return;
        let html = `<div class="sections-grid">`;
        for (let [key, section] of Object.entries(siteData.sections)) {
            html += `<div class="section-card" data-section="${key}">
                        <span class="section-emoji">${section.emoji}</span>
                        <div class="section-name">${escapeHtml(section.name_ba)}</div>
                        <div class="section-desc">${escapeHtml(section.name_ru)}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        
        document.querySelectorAll('.section-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSection = card.getAttribute('data-section');
                currentSubcat = null;
                updateNavigation();
                renderSubcategories();
            });
        });
    }
    
    backBtn.addEventListener('click', () => {
        if (currentSubcat !== null) {
            currentSubcat = null;
            updateNavigation();
            renderSubcategories();
        } else if (currentSection !== null) {
            currentSection = null;
            updateNavigation();
            renderSections();
        }
    });
    
    function renderCurrentDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const ruDate = now.toLocaleDateString('ru-RU', options);
        const baMap = { 'понедельник':'Дүшәмбе', 'вторник':'Шишәмбе', 'среда':'Шаршамбы',
            'четверг':'Кесаҙна', 'пятница':'Йома', 'суббота':'Шәмбе', 'воскресенье':'Йәкшәмбе' };
        let baDate = ruDate;
        for (let [ru, ba] of Object.entries(baMap)) baDate = baDate.replace(ru, ba);
        document.getElementById('currentDateBox').innerHTML = `📅 ${baDate}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    async function init() {
        renderCurrentDate();
        const loaded = await loadData();
        if (loaded) {
            renderHolidaysWidget();
            renderSections();
            updateNavigation();
        }
    }
    
    init();
</script>
</body>
</html>

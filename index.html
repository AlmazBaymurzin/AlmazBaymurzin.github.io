<!DOCTYPE html>
<html lang="ba">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Йылы һүҙҙәр — Поздравления на башкирском языке</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef9e8 0%, #f0e6d8 100%);
            color: #2c241a;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .main-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        .content-area {
            flex: 3;
            min-width: 0;
        }
        .sidebar {
            flex: 1.2;
            min-width: 260px;
        }
        header {
            text-align: center;
            padding: 1.5rem 0 0.5rem 0;
        }
        h1 {
            font-size: 2.5rem;
            color: #8b5a2b;
        }
        .sub {
            font-size: 1rem;
            color: #a07649;
            margin-top: 6px;
        }
        .current-date-box {
            background: rgba(139,90,43,0.08);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #6b4925;
        }
        .loading, .error {
            text-align: center;
            padding: 60px;
            color: #b8956a;
        }
        .error {
            color: #c96a2a;
            background: #fff0e6;
            border-radius: 32px;
        }
        .search-container {
            margin: 20px 0;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border: 2px solid #e8d5b5;
            border-radius: 60px;
            background: white;
            outline: none;
        }
        .search-input:focus {
            border-color: #8b5a2b;
        }
        .search-clear {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #b8956a;
            display: none;
        }
        .search-stats {
            font-size: 0.8rem;
            color: #b8956a;
            margin-top: 8px;
            padding-left: 10px;
        }
        .card-of-day {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8d4 100%);
            border-radius: 32px;
            padding: 20px 28px;
            margin: 20px 0;
            border: 2px solid #e8c9a8;
        }
        .card-of-day-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b5a2b;
            margin-bottom: 16px;
        }
        .card-of-day-content {
            font-size: 1.2rem;
            line-height: 1.45;
            font-family: 'Georgia', serif;
            color: #4a2c1a;
            margin-bottom: 12px;
        }
        .card-of-day-trans {
            font-size: 0.85rem;
            color: #8f7a64;
        }
        .motivation-block {
            background: linear-gradient(135deg, #e8dcc8 0%, #dacaa8 100%);
            border-radius: 32px;
            padding: 28px 32px;
            margin: 25px 0 20px 0;
            text-align: center;
        }
        .motivation-quote {
            font-size: 1.3rem;
            font-style: italic;
            color: #4a2c1a;
            font-family: 'Georgia', serif;
        }
        .back-button {
            display: inline-block;
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 15px 0;
            cursor: pointer;
            font-size: 0.9rem;
            color: #8b5a2b;
        }
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .section-card, .subcat-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .section-card:hover, .subcat-card:hover {
            transform: translateY(-4px);
            background: #fffbf5;
        }
        .section-emoji, .subcat-emoji {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 10px;
        }
        .section-name, .subcat-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #5c3e1e;
        }
        .section-desc, .subcat-desc {
            font-size: 0.75rem;
            color: #b8956a;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 20px 0;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            transition: transform 0.2s;
            border: 1px solid rgba(139,90,43,0.15);
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-badge {
            display: inline-block;
            background: #f4ebdd;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #8b5a2b;
            margin-bottom: 16px;
        }
        .card-text {
            font-size: 1.3rem;
            line-height: 1.45;
            font-family: 'Georgia', serif;
            color: #2c241a;
            margin-bottom: 20px;
        }
        .card-translation {
            font-size: 0.85rem;
            color: #8f7a64;
            border-top: 1px solid #f0e2d2;
            padding-top: 16px;
        }
        .holidays-widget {
            background: white;
            border-radius: 32px;
            padding: 24px;
            position: sticky;
            top: 20px;
        }
        .widget-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #8b5a2b;
            border-bottom: 2px solid #f0e2d2;
            padding-bottom: 12px;
            margin-bottom: 18px;
        }
        .holiday-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0e2d2;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .holiday-item:hover {
            background: #fef5e8;
            padding-left: 6px;
        }
        .holiday-date {
            font-size: 0.7rem;
            background: #f4ebdd;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .holiday-name {
            font-size: 0.85rem;
            color: #3a2a1a;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 35px 25px;
            background: rgba(139,90,43,0.05);
            border-radius: 48px;
        }
        .project-name {
            font-size: 1.8rem;
            font-family: 'Georgia', serif;
            color: #8b5a2b;
        }
        .last-updated {
            font-size: 0.7rem;
            color: #b8956a;
            margin-top: 12px;
        }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🌾 ЙЫЛЫ һҮҘҘӘР 🌾</h1>
        <div class="sub">Башҡортса ҡотлауҙар — һәр көн өсөн йылы теләктәр</div>
        <div class="current-date-box" id="currentDateBox"></div>
    </header>

    <div id="navigation">
        <button class="back-button" id="backBtn" style="display: none;">← Артҡа / Назад</button>
    </div>

    <div class="main-layout">
        <div class="content-area">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Эҙләү | Поиск...">
                <button id="searchClear" class="search-clear">✖</button>
                <div id="searchStats" class="search-stats"></div>
            </div>
            <div id="cardOfDayContainer"></div>
            <div id="motivationBlock" style="display: none;"></div>
            <div id="contentContainer"><div class="loading">📡 Мәғлүмәт тейәлә...<br>Загрузка...</div></div>
        </div>
        <div class="sidebar">
            <div class="holidays-widget">
                <div class="widget-title">📅 Яҡын киләсәк байрамдар</div>
                <div id="holidaysContent"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="project-name">ЙЫЛЫ һҮҘҘӘР<br><small>yily huzzar</small></div>
        <div>❤️ Йөрәк йылыһы — туған телдә әйтелгән һүҙҙә</div>
        <div id="lastUpdated" class="last-updated"></div>
    </div>
</div>

<script>
    // ВАША ССЫЛКА НА CSV (исправлена через прокси)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDLDzoh4yRexTcjzC-O2uV04i1_jwtzgFvBmvniTrkLKTOh9RAIIZO1ZkqsYWaP2u4CCDL6wj954De/pub?output=csv";
    // Прокси для обхода CORS
    const PROXY_URL = "https://api.allorigins.win/raw?url=";
    
    let siteData = null;
    let currentSection = null;
    let currentSubcat = null;
    let isSearchMode = false;
    
    const contentContainer = document.getElementById('contentContainer');
    const backBtn = document.getElementById('backBtn');
    const motivationBlock = document.getElementById('motivationBlock');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const cardOfDayContainer = document.getElementById('cardOfDayContainer');
    
    // Парсинг CSV
    function parseCSV(csvText) {
        const rows = [];
        const regex = /(?:,|\n|^)(?:"([^"]*(?:""[^"]*)*)"|([^",\n]*))/g;
        let row = [];
        let match;
        while ((match = regex.exec(csvText)) !== null) {
            if (match[0].startsWith('\n') && row.length) {
                rows.push(row);
                row = [];
            }
            let value = match[1] !== undefined ? match[1].replace(/""/g, '"') : (match[2] || '');
            row.push(value.trim());
        }
        if (row.length) rows.push(row);
        return rows;
    }
    
    // Загрузка данных из Google Sheets через прокси
    async function loadData() {
        try {
            const response = await fetch(PROXY_URL + encodeURIComponent(CSV_URL));
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const csvText = await response.text();
            const rows = parseCSV(csvText);
            if (rows.length < 2) throw new Error("Таблица пуста");
            
            const headers = rows[0];
            const getCol = (name) => headers.indexOf(name);
            
            const sections = {};
            const allGreetings = [];
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const sectionKey = row[getCol("category_section")]?.trim() || "other";
                const sectionBa = row[getCol("category_name_ba")]?.trim() || "Бүлек";
                const sectionRu = row[getCol("category_name_ru")]?.trim() || "Раздел";
                const subBa = row[getCol("subcategory_name_ba")]?.trim() || "Категория";
                const subRu = row[getCol("subcategory_name_ru")]?.trim() || "Категория";
                const emoji = row[getCol("emoji")]?.trim() || "💬";
                const textBa = row[getCol("greeting_text_ba")]?.trim();
                const transRu = row[getCol("greeting_translation_ru")]?.trim() || "";
                
                if (!textBa) continue;
                
                if (!sections[sectionKey]) {
                    sections[sectionKey] = { name: sectionBa, nameRu: sectionRu, emoji: emoji, subcategories: {} };
                }
                if (!sections[sectionKey].subcategories[subBa]) {
                    sections[sectionKey].subcategories[subBa] = { name: subBa, nameRu: subRu, emoji: emoji, greetings: [] };
                }
                sections[sectionKey].subcategories[subBa].greetings.push({ text: textBa, translation: transRu });
                allGreetings.push({ text: textBa, translation: transRu, category: subBa, categoryRu: subRu, section: sectionBa, emoji: emoji });
            }
            
            siteData = { sections, allGreetings, lastUpdate: new Date() };
            document.getElementById('lastUpdated').innerHTML = `🔄 ${siteData.lastUpdate.toLocaleString('ru-RU')}`;
            return true;
        } catch (error) {
            contentContainer.innerHTML = `<div class="error">❌ Ошибка: ${error.message}<br><br>Проверьте, что таблица опубликована как CSV.</div>`;
            return false;
        }
    }
    
    // Отрисовка интерфейса (сокращённо, как в предыдущем работающем коде)
    function renderSections() {
        if (!siteData) return;
        let html = `<div class="sections-grid">`;
        for (let [key, sec] of Object.entries(siteData.sections)) {
            html += `<div class="section-card" data-section="${key}">
                        <span class="section-emoji">${sec.emoji}</span>
                        <div class="section-name">${escapeHtml(sec.name)}</div>
                        <div class="section-desc">${escapeHtml(sec.nameRu)}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        document.querySelectorAll('.section-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSection = card.dataset.section;
                currentSubcat = null;
                isSearchMode = false;
                searchInput.value = '';
                document.getElementById('searchStats').innerHTML = '';
                updateUI();
                renderSubcategories();
            });
        });
    }
    
    function renderSubcategories() {
        if (!siteData || !currentSection) return;
        const sec = siteData.sections[currentSection];
        let html = `<div class="sections-grid">`;
        for (let [key, sub] of Object.entries(sec.subcategories)) {
            html += `<div class="subcat-card" data-subcat="${key}">
                        <span class="subcat-emoji">${sub.emoji}</span>
                        <div class="subcat-name">${escapeHtml(sub.name)}</div>
                        <div class="subcat-desc">${escapeHtml(sub.nameRu)}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        document.querySelectorAll('.subcat-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSubcat = card.dataset.subcat;
                isSearchMode = false;
                searchInput.value = '';
                updateUI();
                renderGreetings();
            });
        });
    }
    
    function renderGreetings() {
        if (!siteData || !currentSection || !currentSubcat) return;
        const sub = siteData.sections[currentSection].subcategories[currentSubcat];
        let html = `<div class="cards-grid">`;
        sub.greetings.forEach(g => {
            html += `<div class="card">
                        <div class="card-badge">${sub.name} | ${sub.nameRu}</div>
                        <div class="card-text">${escapeHtml(g.text)}</div>
                        <div class="card-translation">💭 ${escapeHtml(g.translation)}</div>
                    </div>`;
        });
        html += `</div>`;
        contentContainer.innerHTML = html;
    }
    
    function getTodaysGreeting() {
        if (!siteData?.allGreetings.length) return null;
        const today = new Date().toDateString();
        let stored = localStorage.getItem('cardOfDay');
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.date === today) return parsed.greeting;
        }
        const random = siteData.allGreetings[Math.floor(Math.random() * siteData.allGreetings.length)];
        localStorage.setItem('cardOfDay', JSON.stringify({ date: today, greeting: random }));
        return random;
    }
    
    function renderCardOfDay() {
        const card = getTodaysGreeting();
        if (!card) return;
        cardOfDayContainer.innerHTML = `
            <div class="card-of-day">
                <div class="card-of-day-title">⭐ Бөгөнгө йылы һүҙ / Слово дня</div>
                <div class="card-of-day-content">${escapeHtml(card.text)}</div>
                <div class="card-of-day-trans">💭 ${escapeHtml(card.translation)}</div>
                <div style="font-size:0.7rem; margin-top:10px;">🏷️ ${card.category} | ${card.section}</div>
            </div>
        `;
    }
    
    function searchGreetings(query) {
        if (!siteData) return [];
        const q = query.toLowerCase();
        return siteData.allGreetings.filter(g => g.text.toLowerCase().includes(q) || g.translation.toLowerCase().includes(q));
    }
    
    function renderSearchResults(results, query) {
        if (!results.length) {
            contentContainer.innerHTML = `<div class="no-results">🔍 «${escapeHtml(query)}» буйынса табылмады</div>`;
            document.getElementById('searchStats').innerHTML = `0 результатов`;
            return;
        }
        document.getElementById('searchStats').innerHTML = `${results.length} результатов: «${escapeHtml(query)}»`;
        let html = `<div class="cards-grid">`;
        results.forEach(g => {
            html += `<div class="card">
                        <div class="card-badge">${g.category} | ${g.categoryRu}<br><span style="font-size:0.6rem;">📁 ${g.section}</span></div>
                        <div class="card-text">${escapeHtml(g.text)}</div>
                        <div class="card-translation">💭 ${escapeHtml(g.translation)}</div>
                    </div>`;
        });
        html += `</div>`;
        contentContainer.innerHTML = html;
    }
    
    function updateUI() {
        if (currentSection === null && !isSearchMode) {
            backBtn.style.display = 'none';
            motivationBlock.style.display = 'block';
            motivationBlock.innerHTML = `<div class="motivation-block"><div class="motivation-quote">«Туған телдә әйтелгән йылы һүҙ — йөрәккә шифа»</div><div class="motivation-author">— Башҡорт халыҡ мәҡәле</div><div style="margin-top:16px;">🌾 Кешенең туған телендә ҡотлау — уның йөрәгенә иң ҡыҫҡа юл.</div></div>`;
            renderCardOfDay();
        } else {
            backBtn.style.display = 'inline-block';
            motivationBlock.style.display = 'none';
            cardOfDayContainer.innerHTML = '';
        }
    }
    
    function renderDate() {
        const now = new Date();
        const ruDate = now.toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const baMap = { 'понедельник':'Дүшәмбе', 'вторник':'Шишәмбе', 'среда':'Шаршамбы', 'четверг':'Кесаҙна', 'пятница':'Йома', 'суббота':'Шәмбе', 'воскресенье':'Йәкшәмбе' };
        let baDate = ruDate;
        for (let [ru, ba] of Object.entries(baMap)) baDate = baDate.replace(ru, ba);
        document.getElementById('currentDateBox').innerHTML = `📅 ${baDate}`;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    backBtn.addEventListener('click', () => {
        if (isSearchMode) {
            isSearchMode = false;
            searchInput.value = '';
            document.getElementById('searchStats').innerHTML = '';
            if (currentSubcat) renderGreetings();
            else if (currentSection) renderSubcategories();
            else renderSections();
            updateUI();
        } else if (currentSubcat) {
            currentSubcat = null;
            renderSubcategories();
            updateUI();
        } else if (currentSection) {
            currentSection = null;
            renderSections();
            updateUI();
        }
    });
    
    searchInput.addEventListener('input', (e) => {
        const q = e.target.value;
        if (q.trim()) {
            const results = searchGreetings(q);
            renderSearchResults(results, q);
            isSearchMode = true;
            updateUI();
            searchClear.style.display = 'block';
        } else {
            isSearchMode = false;
            searchClear.style.display = 'none';
            document.getElementById('searchStats').innerHTML = '';
            if (currentSubcat) renderGreetings();
            else if (currentSection) renderSubcategories();
            else renderSections();
            updateUI();
        }
    });
    
    searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.style.display = 'none';
        isSearchMode = false;
        document.getElementById('searchStats').innerHTML = '';
        if (currentSubcat) renderGreetings();
        else if (currentSection) renderSubcategories();
        else renderSections();
        updateUI();
    });
    
    // Запуск
    renderDate();
    loadData().then(success => {
        if (success) {
            renderSections();
            updateUI();
        }
    });
    
    // Простые праздники для примера
    document.getElementById('holidaysContent').innerHTML = `
        <div class="holiday-item"><span class="holiday-date">8 Март</span><span class="holiday-name">8 Марта</span></div>
        <div class="holiday-item"><span class="holiday-date">23 Февр</span><span class="holiday-name">23 Февраля</span></div>
        <div class="holiday-item"><span class="holiday-date">1 Ғин</span><span class="holiday-name">Яңы йыл</span></div>
    `;
</script>
</body>
</html>

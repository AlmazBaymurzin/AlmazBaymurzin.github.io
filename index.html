    </header>

    </div>

            <div id="cardOfDayContainer"></div>
            <div id="motivationBlock" style="display: none;"></div>
            <div id="contentContainer"><div style="text-align:center; padding:60px;">📡 Мәғлүмәт тейәлә...</div></div>
        </div>

        <div class="sidebar">
            <div class="stats-panel" id="statsPanel">
                <div class="stats-title">📊 Күсереп алыу статистикаһы<br><small>Статистика копирований</small></div>
                <div id="statsContent"></div>
                <div class="stats-reset">
                    <button class="reset-stats-btn" onclick="resetAllStats()">Сбросить статистику</button>
                </div>
            </div>
            <div class="holidays-widget">
                <div class="widget-title">📅 Яҡын киләсәк байрамдар</div>

            </div>

        <div class="project-name">ЙЫЛЫ һҮҘҘӘР<br><small>yily huzzar</small></div>

    </div>

<script>
    // ========== ЗАГРУЗКА ДАННЫХ ИЗ data.json ==========
    let siteData = null;
    let currentSection = null;
    let currentSubcat = null;
    let isSearchMode = false;
    
    // Ключ для хранения статистики в localStorage
    const STATS_KEY = 'greeting_copy_stats';
    
    const contentContainer = document.getElementById('contentContainer');
    const backBtn = document.getElementById('backBtn');
    const motivationBlock = document.getElementById('motivationBlock');
    const cardOfDayContainer = document.getElementById('cardOfDayContainer');
    const holidaysContent = document.getElementById('holidaysContent');
    const statsContent = document.getElementById('statsContent');
    
    // ========== ФУНКЦИИ СТАТИСТИКИ ==========
    function getStats() {
        const saved = localStorage.getItem(STATS_KEY);
        if (saved) {
            return JSON.parse(saved);
        }
        return {};
    }
    
    function saveStats(stats) {
        localStorage.setItem(STATS_KEY, JSON.stringify(stats));
        renderStats();
    }
    
    function incrementStats(greetingId, type) {
        const stats = getStats();
        if (!stats[greetingId]) {
            stats[greetingId] = { full: 0, only_ba: 0, text_ba: '', text_ru: '' };
        }
        if (type === 'full') {
            stats[greetingId].full++;
        } else if (type === 'only_ba') {
            stats[greetingId].only_ba++;
        }
        saveStats(stats);
    }
    
    function renderStats() {
        const stats = getStats();
        const entries = Object.entries(stats);
        
        if (entries.length === 0) {
            statsContent.innerHTML = '<div style="text-align:center; color:#b8956a; padding:10px;">Пока нет копирований</div>';
            return;
        }
        
        // Сортируем по общему количеству копирований
        const sorted = entries.sort((a, b) => {
            const totalA = a[1].full + a[1].only_ba;
            const totalB = b[1].full + b[1].only_ba;
            return totalB - totalA;
        });
        
        let html = '';
        sorted.slice(0, 10).forEach(([id, data]) => {
            const total = data.full + data.only_ba;
            const baText = (data.text_ba || '').substring(0, 40) + ((data.text_ba || '').length > 40 ? '...' : '');
            html += `
                <div class="stats-item">
                    <span title="${escapeHtml(data.text_ba || '')}">📖 ${escapeHtml(baText)}</span>
                    <span>📊 ${total}</span>
                </div>
                <div class="stats-item" style="font-size:0.7rem; color:#b8956a; padding-left:15px;">
                    <span>📤 Полный: ${data.full}</span>
                    <span>📋 Только баш.: ${data.only_ba}</span>
                </div>
            `;
        });
        
        statsContent.innerHTML = html;
    }
    
    function resetAllStats() {
        if (confirm('Сбросить всю статистику копирований?')) {
            localStorage.removeItem(STATS_KEY);
            renderStats();
            showToast('Статистика сброшена');
        }
    }
    
    // ========== ФУНКЦИИ КОПИРОВАНИЯ ==========
    async function copyToClipboard(ruText, baText, greetingId) {
        const shareText = `${baText}\n\n💭 ${ruText}`;
        
        // Инкрементируем статистику
        incrementStats(greetingId, 'full');
        
        // Пробуем использовать Web Share API (особенно полезно на мобильных устройствах)
        if (navigator.share && window.innerWidth <= 768) {
            try {
                await navigator.share({
                    title: 'Поздравление на башкирском',
                    text: shareText
                });
                showToast('Поделились!');
                return;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.log('Share cancelled or failed:', err);
                }
                // Если пользователь отменил или share не работает, продолжаем с копированием
            }
        }
        
        // Fallback: копирование в буфер обмена
        try {
            await navigator.clipboard.writeText(shareText);
            showToast('✅ Поздравление скопировано!');
        } catch (err) {
            // Старый метод для браузеров без clipboard API
            const textarea = document.createElement('textarea');
            textarea.value = shareText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('✅ Поздравление скопировано!');
        }
    }
    
    async function copyOnlyBashkir(baText, greetingId) {
        // Инкрементируем статистику
        incrementStats(greetingId, 'only_ba');
        
        // Пробуем использовать Web Share API для мобильных
        if (navigator.share && window.innerWidth <= 768) {
            try {
                await navigator.share({
                    title: 'Поздравление на башкирском',
                    text: baText
                });
                showToast('Поделились!');
                return;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.log('Share cancelled or failed:', err);
                }
            }
        }
        
        // Копирование только башкирского текста
        try {
            await navigator.clipboard.writeText(baText);
            showToast('✅ Только башкирский текст скопирован!');
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = baText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('✅ Только башкирский текст скопирован!');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 2000);
    }
    
    // ========== ОСНОВНАЯ ЛОГИКА ==========
    async function loadData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            if (!response.ok) throw new Error('Не удалось загрузить data.json');
            const data = await response.json();
            siteData = data;
            renderStats(); // Показываем статистику
            return true;
        } catch (error) {
            contentContainer.innerHTML = `<div style="text-align:center; padding:60px; color:#c96a2a;">❌ Ошибка: ${error.message}<br>Убедитесь, что файл data.json существует</div>`;
            return false;
        }
    }
    
    function getAllGreetings() {
        if (!siteData) return [];
        const all = [];
        for (let secKey in siteData.sections) {
            const section = siteData.sections[secKey];
            for (let subKey in section.subcategories) {
                const subcat = section.subcategories[subKey];
                subcat.greetings.forEach(g => {
                    all.push({
                        text_ba: g.text_ba,
                        translation_ru: g.translation_ru,
                        category: subcat.name_ba,
                        categoryRu: subcat.name_ru,
                        section: section.name_ba,
                        emoji: subcat.emoji
                    });
                });
            }
        }
        return all;
    }
    
    function getTodaysGreeting() {
        const all = getAllGreetings();
        if (!all.length) return null;
        const today = new Date().toDateString();
        let stored = localStorage.getItem('cardOfDay');
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.date === today) return parsed.greeting;
        }
        const randomIndex = Math.floor(Math.random() * all.length);
        const greeting = all[randomIndex];
        localStorage.setItem('cardOfDay', JSON.stringify({ date: today, greeting: greeting }));
        return greeting;
    }
    
    function renderCardOfDay() {
        const card = getTodaysGreeting();
        if (!card) return;
        cardOfDayContainer.innerHTML = `
            <div class="card-of-day">
                <div class="card-of-day-title"><span>⭐</span> Бөгөнгө йылы һүҙ / Тёплое слово дня</div>
                <div class="card-of-day-content">${escapeHtml(card.text_ba)}</div>
                <div class="card-of-day-trans">💭 ${escapeHtml(card.translation_ru)}</div>
                <div style="font-size:0.7rem; margin-top:10px; color:#b8956a;">🏷️ ${card.category} | ${card.section}</div>
            </div>
        `;
    }
    
    function renderHolidaysWidget() {
        if (!siteData || !siteData.holidays_widget) {
            if (holidaysContent) holidaysContent.innerHTML = '<div class="holiday-item">Загрузка...</div>';
            return;
        }
        
        const holidays = siteData.holidays_widget;
        if (!holidays.length) {
            holidaysContent.innerHTML = '<div class="holiday-item">Ближайших праздников нет</div>';
            return;
        }
        
        const today = new Date();
        const currentYear = today.getFullYear();
        
        const holidaysWithDates = holidays.map(h => {
            if (!h.date) return { ...h, timestamp: Infinity, displayDate: '???' };
            const parts = h.date.split('-');
            if (parts.length !== 2) return { ...h, timestamp: Infinity, displayDate: h.date };
            const [month, day] = parts;
            let holidayDate = new Date(currentYear, parseInt(month)-1, parseInt(day));
            if (holidayDate < today) {
                holidayDate = new Date(currentYear + 1, parseInt(month)-1, parseInt(day));
            }
            return {
                ...h,
                displayDate: `${day}.${month}`,
                timestamp: holidayDate.getTime()
            };
        });
        
        holidaysWithDates.sort((a, b) => a.timestamp - b.timestamp);
        const upcoming = holidaysWithDates.slice(0, 10);
        
        let html = '';
        upcoming.forEach(h => {
            const nameBa = h.name_ba || '???';
            const nameRu = h.name_ru || '';
            html += `
                <div class="holiday-item">
                    <span class="holiday-date">${h.displayDate}</span>
                    <span class="holiday-name">${escapeHtml(nameBa)}${nameRu ? '<br><small>' + escapeHtml(nameRu) + '</small>' : ''}</span>
                </div>
            `;
        });
        
        holidaysContent.innerHTML = html;
    }
    
    function showMotivationBlock(show) {
        if (show) {
            motivationBlock.style.display = 'block';
            motivationBlock.innerHTML = `
                <div class="motivation-block">
                    <div class="motivation-quote">«Туған телдә әйтелгән йылы һүҙ — йөрәккә шифа»</div>
                    <div class="motivation-author">— Башҡорт халыҡ мәҡәле</div>
                    <div style="margin-top:16px;">🌾 Кешенең туған телендә ҡотлау — уның йөрәгенә иң ҡыҫҡа юл.</div>
                </div>
            `;
        } else {
            motivationBlock.style.display = 'none';
        }
    }
    
    function updateNavigation() {
        if (currentSection === null && !isSearchMode) {
            backBtn.style.display = 'none';
            showMotivationBlock(true);
            renderCardOfDay();
        } else {
            backBtn.style.display = 'inline-block';
            showMotivationBlock(false);
            cardOfDayContainer.innerHTML = '';
        }
    }
    
    // Генерация уникального ID для поздравления
    function generateGreetingId(sectionKey, subcatKey, index, text) {
        return `${sectionKey}_${subcatKey}_${index}_${text.substring(0, 20)}`.replace(/[^a-zA-Z0-9_-]/g, '_');
    }
    
    function renderGreetings() {
        if (!siteData || !currentSection || !currentSubcat) return;
        const subcat = siteData.sections[currentSection].subcategories[currentSubcat];
        if (!subcat) return;
        
        let html = `<div class="cards-grid">`;
        
        subcat.greetings.forEach((g, index) => {
            const greetingId = generateGreetingId(currentSection, currentSubcat, index, g.text_ba);
            const stats = getStats();
            const copyCount = stats[greetingId] ? (stats[greetingId].full + stats[greetingId].only_ba) : 0;
            
            html += `<div class="card">
                        <div class="card-badge">${escapeHtml(subcat.name_ba)} | ${escapeHtml(subcat.name_ru)}</div>
                        <div class="card-text">${escapeHtml(g.text_ba)}</div>
                        <div class="card-translation">💭 ${escapeHtml(g.translation_ru)}</div>
                        <div class="button-group">
                            <button class="share-btn" data-type="full" data-ba="${escapeHtml(g.text_ba).replace(/'/g, "\\'")}" data-ru="${escapeHtml(g.translation_ru).replace(/'/g, "\\'")}" data-id="${greetingId}">
                                📤 Поделиться
                            </button>
                            <button class="copy-only-btn" data-type="only_ba" data-ba="${escapeHtml(g.text_ba).replace(/'/g, "\\'")}" data-id="${greetingId}">
                                📋 Только башкирский
                            </button>
                        </div>
                        ${copyCount > 0 ? `<div class="copy-stats">📊 ${copyCount}</div>` : ''}
                    </div>`;
        });
        
        html += `</div>`;
        contentContainer.innerHTML = html;
        
        // Добавляем обработчики для кнопок
        document.querySelectorAll('.share-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const baText = btn.getAttribute('data-ba');
                const ruText = btn.getAttribute('data-ru');
                const id = btn.getAttribute('data-id');
                copyToClipboard(ruText, baText, id);
            });
        });
        
        document.querySelectorAll('.copy-only-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const baText = btn.getAttribute('data-ba');
                const id = btn.getAttribute('data-id');
                copyOnlyBashkir(baText, id);
            });
        });
    }
    
    function renderSubcategories() {
        if (!siteData || !currentSection) return;
        const section = siteData.sections[currentSection];
        if (!section) return;
        let html = `<div class="sections-grid">`;
        for (let [key, subcat] of Object.entries(section.subcategories)) {
            html += `<div class="subcat-card" data-subcat="${key}">
                        <span class="subcat-emoji">${subcat.emoji}</span>
                        <div class="subcat-name">${escapeHtml(subcat.name_ba)}</div>
                        <div class="subcat-desc">${escapeHtml(subcat.name_ru)}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        
        document.querySelectorAll('.subcat-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSubcat = card.getAttribute('data-subcat');
                isSearchMode = false;
                updateNavigation();
                renderGreetings();
            });
        });
    }
    
    function renderSections() {
        if (!siteData) return;
        let html = `<div class="sections-grid">`;
        for (let [key, section] of Object.entries(siteData.sections)) {
            html += `<div class="section-card" data-section="${key}">
                        <span class="section-emoji">${section.emoji}</span>
                        <div class="section-name">${escapeHtml(section.name_ba)}</div>
                        <div class="section-desc">${escapeHtml(section.name_ru)}</div>
                    </div>`;
        }
        html += `</div>`;
        contentContainer.innerHTML = html;
        
        document.querySelectorAll('.section-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSection = card.getAttribute('data-section');
                currentSubcat = null;
                isSearchMode = false;
                updateNavigation();
                renderSubcategories();
            });
        });
    }
    
    backBtn.addEventListener('click', () => {
        if (isSearchMode) {
            isSearchMode = false;
            if (currentSection && currentSubcat) {
                renderGreetings();
            } else if (currentSection) {
                renderSubcategories();
            } else {
                renderSections();
            }
            updateNavigation();
            return;
        }
        if (currentSubcat !== null) {
            currentSubcat = null;
            updateNavigation();
            renderSubcategories();
            return;
        }
        if (currentSection !== null) {
            currentSection = null;
            updateNavigation();
            renderSections();
            return;
        }
    });
    
    function renderCurrentDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const ruDate = now.toLocaleDateString('ru-RU', options);
        const baMap = { 
            'понедельник':'Дүшәмбе', 'вторник':'Шишәмбе', 'среда':'Шаршамбы',
            'четверг':'Кесаҙна', 'пятница':'Йома', 'суббота':'Шәмбе', 'воскресенье':'Йәкшәмбе' 
        };
        let baDate = ruDate;
        for (let [ru, ba] of Object.entries(baMap)) baDate = baDate.replace(ru, ba);
        document.getElementById('currentDateBox').innerHTML = `📅 ${baDate}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function init() {
        renderCurrentDate();
        const loaded = await loadData();
        if (loaded) {
            renderHolidaysWidget();
            renderSections();
            updateNavigation();
        }
    }
    
    init();
</script>
</body>
</html>
